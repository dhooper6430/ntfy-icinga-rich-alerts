# Self-hosted ntfy push server + action broker for Icinga rich notifications.
#
# TLS is terminated by a reverse proxy in front of the two plain-HTTP services below:
#   /        -> ntfy   (port 80 inside the network)
#   /broker/ -> broker (port 8080 inside the network)
#
# Two easy ways to get TLS:
#   * Caddy (included) — `docker compose --profile caddy up -d` after copying Caddyfile.example
#     to Caddyfile and setting your domain. Caddy gets a Let's Encrypt cert automatically.
#   * A tunnel (Cloudflare Tunnel / Tailscale Funnel) — no Caddy, no static IP, no open ports.
#     Point the tunnel at the published ntfy/broker ports. See docs/reachability.md.
#
# The dispatcher (which Icinga invokes, on your Icinga master) lives in ../dispatcher/. It
# publishes to ntfy and signs broker callbacks with BROKER_SHARED_SECRET (set in .env here and
# in the dispatcher's config.yml).
#
# Configuration comes from .env (copy .env.example -> .env and fill in).
services:
  ntfy:
    image: binwiederhier/ntfy:${NTFY_VERSION:-latest}
    container_name: ntfy
    command: serve
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - ./server.yml:/etc/ntfy/server.yml:ro
      - ${NTFY_DATA_PATH:-./data}/lib:/var/lib/ntfy
    ports:
      # Published for an upstream reverse proxy / tunnel. Bound to localhost by default; the
      # in-compose Caddy service reaches ntfy over the network instead and ignores this.
      - "${NTFY_BIND:-127.0.0.1}:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:80/v1/health | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  broker:
    build: ./broker
    container_name: ntfy-broker
    restart: unless-stopped
    environment:
      # Icinga API endpoint the broker calls for Ack/Downtime (scoped ntfy-broker ApiUser).
      - ICINGA_API_URL=${ICINGA_API_URL}
      - ICINGA_API_USER=${ICINGA_API_USER:-ntfy-broker}
      # Set ICINGA_API_INSECURE=1 to skip TLS verification of the Icinga API (self-signed certs),
      # or mount a CA and set ICINGA_API_CA to its path.
      - ICINGA_API_INSECURE=${ICINGA_API_INSECURE:-1}
      - GRAPH_CACHE_DIR=/var/cache/icinga-ntfy/graphs
      - DEFAULT_COMMENT=Actioned from ntfy
    env_file:
      # Secrets: BROKER_SHARED_SECRET + ICINGA_API_PASSWORD live here (copied from .env.example).
      - .env
    volumes:
      - ${NTFY_DATA_PATH:-./data}/graphs:/var/cache/icinga-ntfy/graphs
    ports:
      - "${BROKER_BIND:-127.0.0.1}:8081:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if b'ok' in urllib.request.urlopen('http://localhost:8080/healthz',timeout=4).read() else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # Optional automatic-HTTPS reverse proxy. Opt-in: `docker compose --profile caddy up -d`.
  # Skip it entirely if you front the stack with a tunnel (see docs/reachability.md).
  caddy:
    image: caddy:2-alpine
    container_name: ntfy-caddy
    restart: unless-stopped
    profiles: ["caddy"]
    depends_on:
      - ntfy
      - broker
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro      # cp Caddyfile.example Caddyfile, set your domain
      - ${NTFY_DATA_PATH:-./data}/caddy:/data    # certificates + ACME state (persist this!)
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
