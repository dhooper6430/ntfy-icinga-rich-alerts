# push.example.com — public TLS ingress for the ntfy stack (Icinga rich notifications).
#
# This terminates TLS and proxies to the two plain-HTTP services from docker-compose.yml,
# published on localhost by default:
#   /        -> ntfy   127.0.0.1:8080  (SSE stream => proxy_buffering off; large body for graphs)
#   /broker/ -> broker 127.0.0.1:8081  (Ack/Downtime callbacks + graph PNG; trailing slash strips prefix)
#
# Adjust upstream addresses if you changed NTFY_BIND / BROKER_BIND or run the proxy on a
# different host. Bring your own certificate (any ACME client / wildcard works).
server {
    listen 80;
    server_name push.example.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name push.example.com;

    ssl_certificate     /etc/nginx/ssl/push.example.com/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/push.example.com/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ntfy action-button callbacks (/ack, /downtime) + graph PNG serving — the broker service.
    # Trailing slash on proxy_pass strips the /broker/ prefix (so the broker sees /ack, /graph/...).
    location /broker/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    location / {
        # ntfy runs plain-HTTP behind this proxy, which terminates TLS.
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ntfy specifics: the event stream needs buffering off + a long read timeout, and graph
        # attachments need a larger body limit.
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 20m;
        proxy_connect_timeout 3m;
        proxy_send_timeout 3m;
        proxy_read_timeout 3600s;
    }

    error_log  /var/log/nginx/push.example.com_error.log;
    access_log /var/log/nginx/push.example.com_access.log;
}
