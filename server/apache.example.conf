# Apache2 reverse-proxy vhost for a self-hosted ntfy server.
#
# You already run Apache for Icinga Web, so ntfy rides the same web server: Apache terminates TLS
# and proxies to the ntfy daemon listening on 127.0.0.1:2586 (server.example.yml: listen-http).
#
# Enable the required modules once, then drop this file in and reload:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
#   sudo cp apache.example.conf /etc/apache2/sites-available/push.example.com.conf
#   #   edit ServerName + the SSLCertificate* paths below to match your domain/cert
#   sudo a2ensite push.example.com
#   sudo apache2ctl configtest && sudo systemctl reload apache2

# Port 80 -> 443 redirect (phones and the ntfy app always talk HTTPS).
<VirtualHost *:80>
    ServerName push.example.com
    Redirect permanent / https://push.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName push.example.com

    # TLS terminates here. Point these at your certificate for push.example.com (Let's Encrypt,
    # an internal CA, etc.). ntfy needs https for iOS push to work.
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/push.example.com.pem
    SSLCertificateKeyFile /etc/ssl/private/push.example.com.key

    # ntfy listens locally only (server.yml: listen-http "127.0.0.1:2586"). Preserve the Host
    # header so ntfy builds correct links, and tell it the original scheme was https.
    ProxyPreserveHost On
    ProxyTimeout 600
    RequestHeader set X-Forwarded-Proto "https"

    # WebSocket upgrade — the ntfy app uses a WS connection for the live message stream. Requests
    # carrying an "Upgrade: websocket" header are proxied over ws:// instead of http://.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:2586/$1 [P,L]

    # Everything else is plain HTTP reverse-proxied to the local ntfy daemon. The long timeout
    # keeps ntfy's long-lived SSE/JSON streams (e.g. relay.py's subscription) from being cut.
    ProxyPass        / http://127.0.0.1:2586/ timeout=600
    ProxyPassReverse / http://127.0.0.1:2586/
</VirtualHost>
