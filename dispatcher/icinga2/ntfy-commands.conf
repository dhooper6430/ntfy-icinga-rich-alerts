/*
 * ntfy NotificationCommands — hand off to the dispatcher installed at /opt/ntfy-icinga.
 *
 * Installed by install.sh into the icinga2 conf.d (loaded via the `include "conf.d/*.conf"`
 * glob in icinga2.conf). If you install the dispatcher somewhere other than /opt/ntfy-icinga,
 * adjust the two command paths below to match.
 *
 * The notification APPLY rules that wire these commands to hosts/services live in
 * ntfy-notifications.conf.example (or, if you use Icinga Director, create the equivalent
 * notifications there).
 */

object NotificationCommand "ntfy-service-notification" {
  command = [ "/opt/ntfy-icinga/venv/bin/python3", "/opt/ntfy-icinga/dispatcher/notify.py",
              "--object-type", "service" ]
  env = {
    NOTIFICATIONTYPE       = "$notification.type$"
    HOSTNAME               = "$host.name$"
    HOSTDISPLAYNAME        = "$host.display_name$"
    HOSTADDRESS            = "$address$"
    SERVICENAME            = "$service.name$"
    SERVICEDISPLAYNAME     = "$service.display_name$"
    SERVICESTATE           = "$service.state$"
    SERVICEOUTPUT          = "$service.output$"
    SERVICECHECKCOMMAND    = "$service.check_command$"
    LONGDATETIME           = "$icinga.long_date_time$"
    NOTIFICATIONAUTHORNAME = "$notification.author$"
    NOTIFICATIONCOMMENT    = "$notification.comment$"
    NTFY_TOPIC             = "$user.vars.ntfy_topic$"
    NTFY_USERNAME          = "$user.name$"
    DISPATCHER_CONFIG      = "/opt/ntfy-icinga/dispatcher/config.yml"
  }
}

object NotificationCommand "ntfy-host-notification" {
  command = [ "/opt/ntfy-icinga/venv/bin/python3", "/opt/ntfy-icinga/dispatcher/notify.py",
              "--object-type", "host" ]
  env = {
    NOTIFICATIONTYPE       = "$notification.type$"
    HOSTNAME               = "$host.name$"
    HOSTDISPLAYNAME        = "$host.display_name$"
    HOSTADDRESS            = "$address$"
    HOSTSTATE              = "$host.state$"
    HOSTOUTPUT             = "$host.output$"
    HOSTCHECKCOMMAND       = "$host.check_command$"
    LONGDATETIME           = "$icinga.long_date_time$"
    NOTIFICATIONAUTHORNAME = "$notification.author$"
    NOTIFICATIONCOMMENT    = "$notification.comment$"
    NTFY_TOPIC             = "$user.vars.ntfy_topic$"
    NTFY_USERNAME          = "$user.name$"
    DISPATCHER_CONFIG      = "/opt/ntfy-icinga/dispatcher/config.yml"
  }
}
